<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <title>Social Wiki</title>
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <script>
            const redirectAddress = sessionStorage.redirectAddress;
            sessionStorage.redirectAddress = location.href.slice(
                location.origin.length,
            );
            delete sessionStorage.redirectAddress;
            if (redirectAddress) {
                history.replaceState(null, null, "/#" + redirectAddress);
            }
        </script>
    </head>
    <body>
        <div id="app"></div>
        <script type="module" src="/src/main.ts"></script>
    </body>
</html>
