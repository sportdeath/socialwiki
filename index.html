<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <title>Social Wiki</title>
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="color-scheme" content="light dark" />
        <script>
            // A redirect from a 404 page (see public/404.html)
            const redirectAddress = sessionStorage.redirectAddress;
            delete sessionStorage.redirectAddress;
            if (redirectAddress) {
                history.replaceState(null, null, "/#" + redirectAddress);
            }
        </script>
        <script type="module" src="/src/main.ts"></script>
    </head>
    <body>
        <div id="app"></div>
    </body>
</html>
