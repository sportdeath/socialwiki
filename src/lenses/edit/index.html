<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Social Wiki Edit Lens</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <link rel="stylesheet" href="/src/style.css" />
    <link rel="stylesheet" href="/src/lenses/utils/TwoPaneLayout.css" />
    <script src="/init.js"></script>
  </head>
  <body>
    <div id="app">
      <h1 class="status dots">Page loading</h1>
    </div>

    <template id="app-template">
      <main>
              <two-pane-layout left-title="Editor" right-title="Preview">
                  <template #left-controls>
                      <nav>
                          <ul role="menubar">
                              <li role="none">
                                  <button
                                      type="button"
                                      class="publish-button"
                                      :class="{ 'publish-shake': shouldShakePublish }"
                                      :disabled="publishing"
                                      @click="openPublishDialog"
                                  >
                                      Publish
                                  </button>
                              </li>

                              <li role="none">
                                  <button type="button" @click="download()">
                                      Download
                                  </button>
                              </li>

                              <li role="none">
                                  <details ref="viewMenuDetails">
                                      <summary role="menuitem">▾ View</summary>

                                      <ul role="menu">
                                          <li>
                                              <label class="menu-checkbox">
                                                  <input
                                                      type="checkbox"
                                                      v-model="showDiff"
                                                  />
                                                  Show changes
                                              </label>
                                          </li>

                                          <li role="separator"></li>

                                          <li>
                                              <label class="menu-checkbox">
                                                  <input
                                                      type="checkbox"
                                                      v-model="darkMode"
                                                  />
                                                  Dark mode
                                              </label>
                                          </li>

                                          <li>
                                              <label class="menu-checkbox">
                                                  <input
                                                      type="checkbox"
                                                      v-model="wordWrap"
                                                  />
                                                  Word wrap
                                              </label>
                                          </li>

                                          <li>
                                              <label class="menu-checkbox">
                                                  <input
                                                      type="checkbox"
                                                      v-model="minimapEnabled"
                                                  />
                                                  Show minimap
                                              </label>
                                          </li>

                                          <li>
                                              <label class="menu-checkbox">
                                                  <input
                                                      type="checkbox"
                                                      v-model="renderWhitespace"
                                                  />
                                                  Show whitespace
                                              </label>
                                          </li>

                                          <li>
                                              <label class="menu-checkbox">
                                                  <input
                                                      type="checkbox"
                                                      v-model="vimModeEnabled"
                                                  />
                                                  Vim mode
                                              </label>
                                          </li>
                                      </ul>
                                  </details>
                              </li>
                          </ul>
                      </nav>
                  </template>

                  <template #right-controls>
                      <nav>
                          <ul>
                              <li>
                                  <button
                                      class="refresh-button"
                                      title="Refresh the preview"
                                      @click="refreshPreview"
                                  >
                                      Refresh
                                      <span
                                          v-if="debouncing"
                                          class="refresh-spinner"
                                          aria-hidden="true"
                                      ></span>
                                  </button>
                              </li>
                              <li>
                                  <label class="top-level-checkbox">
                                      <input type="checkbox" v-model="livePreview" />
                                      Auto-refresh
                                  </label>
                              </li>
                          </ul>
                      </nav>
                  </template>

                  <!-- Left pane body (Editor) -->
                  <template #left-pane>
                      <div class="pane">
                          <code-editor
                              v-if="!showDiff"
                              v-model:value="editorHtml"
                              language="html"
                              :theme="editorTheme"
                              :options="monacoOptions"
                              @editor-did-mount="onEditorDidMount"
                              class="code-editor"
                          ></code-editor>

                          <diff-editor
                              v-else
                              :value="diffHtml"
                              :original="publishedHtml"
                              language="html"
                              :theme="editorTheme"
                              :options="diffOptions"
                              @change="onDiffChange"
                              @editor-did-mount="onDiffDidMount"
                              class="code-editor"
                          ></diff-editor>
                      </div>
                  </template>

                  <!-- Right pane body (Preview) -->
                  <template #right-pane>
                      <div class="pane">
                          <sw-transclude
                              ref="previewTransclude"
                              :id="previewTranscludeId"
                              name="Preview"
                              :query="pageQuery"
                              :key="refreshKey"
                              :srcdoc="previewHtml"
                          ></sw-transclude>
                      </div>
                  </template>
              </two-pane-layout>

              <aside
                  v-if="showPublishDialog"
                  class="publish-dialog-overlay"
                  @click.self="cancelPublishDialog"
              >
                  <dialog open class="publish-dialog">
                      <h2>Publish changes</h2>
                      <form
                          class="publish-form"
                          @submit.prevent="submitPublishDialog"
                      >
                          <label class="publish-field">
                              <span>Page name</span>
                              <input
                                  v-model="publishDialogPageName"
                                  type="text"
                                  required
                                  autocomplete="off"
                                  @focus="selectAllPublishPageName"
                                  @click="selectAllPublishPageName"
                                  :disabled="publishing"
                              />
                          </label>

                          <label class="publish-field">
                              Edit summary (Briefly describe your changes)
                              <input
                                  ref="publishSummaryInput"
                                  v-model="publishDialogSummary"
                                  type="text"
                                  required
                                  autocomplete="off"
                                  :disabled="publishing"
                              />
                          </label>

                          <div class="publish-audience-checkbox">
                              <input
                                  id="publish-audience-confirm"
                                  v-model="publishAudienceConfirmed"
                                  type="checkbox"
                                  required
                                  :disabled="publishing"
                              />
                              <label
                                  for="publish-audience-confirm"
                                  class="publish-audience-label"
                              >
                                  I understand this change will be seen by anyone who
                                  visits the page "<a
                                      class="publish-page-name-link"
                                      :href="publishPageHref"
                                      >{{
                                          normalizedPublishPageName || "this page"
                                      }}</a
                                  >".
                              </label>
                          </div>

                          <p class="publish-license">
                              By publishing changes, you irrevocably agree to release
                              your contribution under the
                              <a
                                  href="https://www.gnu.org/licenses/gpl-3.0.en.html"
                                  target="_blank"
                                  rel="noopener noreferrer"
                                  >GNU GPLv3 License</a
                              >.
                          </p>

                          <footer>
                              <button
                                  type="button"
                                  class="secondary"
                                  :disabled="publishing"
                                  @click="cancelPublishDialog"
                              >
                                  Cancel
                              </button>
                              <button
                                  type="submit"
                                  class="allow-button"
                                  :disabled="publishing || !isPublishDialogValid"
                              >
                                  Publish
                              </button>
                          </footer>
                      </form>
                  </dialog>
              </aside>

              <aside
                  v-if="showProtectedDialog"
                  class="protected-dialog-overlay"
                  @click.self="continueProtectedEdit"
              >
                  <dialog open class="protected-dialog">
                      <h2>Protected Page</h2>
                      <p>
                          This page has been marked as
                          <strong>protected</strong> by
                          <template v-if="isProtectionBySessionActor">
                              <strong>you</strong>.
                          </template>
                          <template v-else-if="activeProtection">
                              <strong>
                                  <graffiti-actor-to-handle
                                      :actor="activeProtection.actor"
                                  ></graffiti-actor-to-handle> </strong
                              >,
                              <template
                                  v-if="activeProtectionTrustSource === 'default'"
                              >
                                  a default
                                  <a :href="trustedEditorsRoute">trusted editor</a>.
                              </template>
                              <template v-else>
                                  an
                                  <a :href="trustedEditorsRoute">editor you trust</a>.
                              </template>
                          </template>
                          <template v-else>a trusted editor.</template>
                      </p>
                      <p>
                          You can still edit this page. However, others may not see
                          your changes unless they mark <strong>you</strong> as a
                          <a :href="trustedEditorsRoute">trusted editor</a>
                          <em> or </em> one of their trusted editors endorses your
                          changes.
                      </p>
                      <p>
                          See this page's
                          <a
                              :href="historyRoute"
                              @click.prevent="openProtectedPageHistory"
                              >History</a
                          >
                          and your
                          <a :href="trustedEditorsRoute">trusted editors</a>
                          for more information.
                      </p>
                      <footer>
                          <button
                              type="button"
                              class="secondary"
                              @click="cancelProtectedEdit"
                          >
                              Cancel
                          </button>
                          <button
                              type="button"
                              class="allow-button"
                              @click="continueProtectedEdit"
                          >
                              Continue to editor
                          </button>
                      </footer>
                  </dialog>
              </aside>

              <div v-if="publishing" class="backdrop" @click.prevent="">
                  <h1 class="dots">Publishing</h1>
              </div>
          </main>
    </template>

    <script type="module">
      import {
        createApp,
        ref,
        shallowRef,
        watch,
        computed,
        nextTick,
        onBeforeUnmount,
        onMounted,
      } from "vue";
      import * as monaco from "monaco-editor";
      import { CodeEditor, DiffEditor } from "monaco-editor-vue3";
      import TwoPaneLayout from "/src/lenses/utils/TwoPaneLayout.js";
      import {
        GraffitiPlugin,
        GraffitiActorToHandle,
        useGraffiti,
        useGraffitiSession,
      } from "@graffiti-garden/wrapper-vue";
      import {
        createPageVersion,
        getPageVersions,
      } from "/src/lenses/utils/page-versions.js";
      import * as MonacoVimModule from "monaco-vim";
      import {
        composeAddress,
        composeQuery,
        parseAddress,
      } from "/src/backend/route.js";
      import { randomBytes, bytesToHex } from "@noble/hashes/utils.js";
      import { annotationSchema } from "/src/lenses/utils/schemas.js";
      import { computeTrustAnnotationsByActor } from "/src/lenses/utils/trust.js";
      import { defaultTrustedEditors } from "/src/lenses/utils/default-trusted-editors.js";
      import { sortProtectionHistory } from "/src/lenses/utils/protection.js";

      const trustedEditorsRoute = "#/v?/trusted-editors";
      const DEBOUNCE_DELAY = 500;
      const initVimMode =
        MonacoVimModule.initVimMode ?? MonacoVimModule.default?.initVimMode;

      if (window.top !== window) {
        function setup() {
          const previewTranscludeId = bytesToHex(randomBytes());
          const previewTransclude = ref(null);
          const publishSummaryInput = ref(null);

          const template = (pageName) => `<!doctype html>
      <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width,initial-scale=1" />

        <!-- Connect the page to Social.Wiki -->
        <script src="${window.topOrigin}/init.js"><\/script>

        <!-- Better default styling -->
        <meta name="color-scheme" content="light dark" />
        <link
          rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/water.css@2/out/water.css"
        />

        <!-- Initialize Vue.js with Graffiti -->
        <script type="module">
          import { createApp } from "vue";
          import { GraffitiPlugin } from "@graffiti-garden/wrapper-vue";

          createApp({
            template: "#template",
            data: () => ({
              processingWave: false,
              // Add more app data here
            }),
          })
            .use(GraffitiPlugin, {
              graffiti: new window.Graffiti(),
            })
            .mount("#app");
        <\/script>
      </head>

      <body>
        <div id="app"><h1>Loading…</h1></div>

        <template id="template">
          <h1>Your page here!</h1>

          <!-- "Discover" any waves from this page -->
          <graffiti-discover
            v-slot="{ objects: waves, isFirstPoll }"
            :channels="[ '${pageName}' ]"
            :schema="{ properties: { value: {
              required: ['activity'],
              properties: {
                activity: { const: 'Wave' }
              }
            }}}"
          >
            <button
              v-if="!$graffitiSession.value"
              @click="$graffiti.login()"
            >
              Log in to wave!
            </button>

            <template v-else>
              <button v-if="isFirstPoll || processingWave" disabled>
                👋 Loading…
              </button>

              <!-- If you haven't waved yet, show "Wave" button -->
              <button
                v-else-if="!waves.some(
                  wave => wave.actor === $graffitiSession.value.actor
                )"
                @click="
                  processingWave = true;
                  $graffiti.post(
                    {
                      value: { activity: 'Wave' },
                      channels: [ '${pageName}' ],
                    },
                    $graffitiSession.value
                  ).finally(() => {
                    processingWave = false;
                  });
                "
              >
                👋 Wave!
              </button>

              <!-- If you have already waved, show "Unwave" button -->
              <button
                v-else
                @click="
                  waves
                    .filter(wave =>
                      wave.actor === $graffitiSession.value.actor
                    )
                    .forEach(wave => {
                      processingWave = true;
                      $graffiti.delete(
                        wave,
                        $graffitiSession.value
                      ).finally(() => {
                        processingWave = false;
                      });
                    });
                "
              >
                👋 Unwave
              </button>
            </template>

            <p>
              {{ new Set(waves.map(w => w.actor)).size }} people have waved from this page.
            </p>
          </graffiti-discover>
        </template>
      </body>`;

          const draftHtml = ref("");
          const publishedHtml = ref(null);
          const editorHtml = ref("");
          const previewHtml = ref("");
          const diffHtml = ref("");
          const hasUnsavedChanges = computed(
            () => editorHtml.value !== publishedHtml.value,
          );
          const hasShownPublishReminder = ref(false);
          const shouldShakePublish = ref(false);
          let publishShakeTimeout = null;

          function resetPublishReminderState() {
            hasShownPublishReminder.value = false;
            shouldShakePublish.value = false;
            if (publishShakeTimeout !== null) {
              clearTimeout(publishShakeTimeout);
              publishShakeTimeout = null;
            }
          }

          watch(
            draftHtml,
            (newHtml) => {
              editorHtml.value = newHtml;
              previewHtml.value = newHtml;
              diffHtml.value = newHtml;
            },
            { immediate: true },
          );

          watch(hasUnsavedChanges, (isDirty, wasDirty) => {
            if (!isDirty || wasDirty || hasShownPublishReminder.value) return;
            hasShownPublishReminder.value = true;
            shouldShakePublish.value = true;
            if (publishShakeTimeout !== null) {
              clearTimeout(publishShakeTimeout);
            }
            publishShakeTimeout = window.setTimeout(() => {
              shouldShakePublish.value = false;
              publishShakeTimeout = null;
            }, 320);
          });

          function onPreviewNavigate(event) {
            if (
              !(event instanceof CustomEvent) ||
              typeof event.detail?.to !== "string"
            ) {
              return;
            }
            const to = event.detail.to;
            if (!to.startsWith("?")) return window.navigate(to);

            const { name } = parseAddress(window.address);
            const newTo = composeQuery(window.params, composeAddress(name, to));
            window.navigate(newTo);
          }

          const pageName = ref("");
          const pageQuery = ref("");
          const pageAddress = computed(() =>
            composeAddress(pageName.value, pageQuery.value),
          );
          const historyRoute = computed(
            () =>
              `#/${composeAddress("h", composeQuery(undefined, pageAddress.value))}`,
          );
          const viewRoute = computed(
            () =>
              `#/${composeAddress("v", composeQuery(undefined, pageAddress.value))}`,
          );

          const isProtectionLoading = ref(false);
          const isProtectedPage = ref(undefined);
          const activeProtection = ref(null);
          const activeProtectionTrustSource = ref(null);
          const showProtectedDialog = ref(false);
          let activeProtectionRequest = 0;
          let localDraftSeq = 0;

          const session = useGraffitiSession();
          const graffiti = useGraffiti();
          const isProtectionBySessionActor = computed(
            () => activeProtection.value?.actor === session.value?.actor,
          );

          function continueProtectedEdit() {
            showProtectedDialog.value = false;
          }

          function cancelProtectedEdit() {
            showProtectedDialog.value = false;
            window.navigate(viewRoute.value);
          }

          function openProtectedPageHistory() {
            window.navigate(historyRoute.value);
          }

          async function waitForSessionStatusKnown() {
            if (session.value !== undefined) return;
            await new Promise((resolve) => {
              const handleSessionReady = () => {
                graffiti.sessionEvents.removeEventListener(
                  "initialized",
                  handleSessionReady,
                );
                graffiti.sessionEvents.removeEventListener(
                  "login",
                  handleSessionReady,
                );
                graffiti.sessionEvents.removeEventListener(
                  "logout",
                  handleSessionReady,
                );
                resolve();
              };
              graffiti.sessionEvents.addEventListener(
                "initialized",
                handleSessionReady,
              );
              graffiti.sessionEvents.addEventListener("login", handleSessionReady);
              graffiti.sessionEvents.addEventListener("logout", handleSessionReady);
            });
          }

          async function getTrustedEditorsContext() {
            const trustAnnotationsByUrl = new Map();
            const currentSession = session.value;
            if (currentSession?.actor) {
              for await (const result of graffiti.discover(
                [currentSession.actor],
                annotationSchema(["Trust", "Untrust"], {
                  actor: currentSession.actor,
                }),
              )) {
                if (result.error) {
                  console.error(result.error);
                  continue;
                }
                if (result.tombstone) {
                  trustAnnotationsByUrl.delete(result.object.url);
                } else {
                  trustAnnotationsByUrl.set(result.object.url, result.object);
                }
              }
            }

            const trustByActor = computeTrustAnnotationsByActor(
              [...trustAnnotationsByUrl.values()],
              defaultTrustedEditors,
            );
            const trustedEditors = new Set(
              [...trustByActor.entries()]
                .filter(
                  ([_, trust]) =>
                    trust === true || trust?.value.activity === "Trust",
                )
                .map(([actor]) => actor),
            );
            if (currentSession?.actor) {
              trustedEditors.add(currentSession.actor);
            }

            return {
              trustedEditors: [...trustedEditors],
              trustByActor,
            };
          }

          async function getProtectionAnnotations(page) {
            const protectionByUrl = new Map();
            for await (const result of graffiti.discover(
              [page],
              annotationSchema(["Protect", "Remove"]),
            )) {
              if (result.error) {
                console.error(result.error);
                continue;
              }
              if (result.tombstone) {
                protectionByUrl.delete(result.object.url);
              } else {
                protectionByUrl.set(result.object.url, result.object);
              }
            }

            return [...protectionByUrl.values()];
          }

          async function refreshPageProtection(page, requestId) {
            isProtectionLoading.value = true;
            isProtectedPage.value = undefined;
            activeProtection.value = null;
            activeProtectionTrustSource.value = null;
            showProtectedDialog.value = false;
            try {
              await waitForSessionStatusKnown();
              if (requestId !== activeProtectionRequest) return;

              const [trustedEditorsContext, protectionAnnotations] =
                await Promise.all([
                  getTrustedEditorsContext(),
                  getProtectionAnnotations(page),
                ]);
              if (requestId !== activeProtectionRequest) return;

              const protectionHistory = sortProtectionHistory(
                protectionAnnotations,
                trustedEditorsContext.trustedEditors,
              );
              const latestProtection = protectionHistory.at(0);
              const isProtected = latestProtection?.value.activity === "Protect";
              isProtectedPage.value = isProtected;
              if (isProtected && latestProtection) {
                activeProtection.value = latestProtection;
                if (latestProtection.actor !== session.value?.actor) {
                  activeProtectionTrustSource.value =
                    trustedEditorsContext.trustByActor.get(latestProtection.actor) ===
                    true
                      ? "default"
                      : "trusted";
                }
              }
              showProtectedDialog.value = isProtected;
            } catch (error) {
              console.error(`Error checking page protection: ${String(error)}`);
              if (requestId !== activeProtectionRequest) return;
              isProtectedPage.value = false;
              activeProtection.value = null;
              activeProtectionTrustSource.value = null;
              showProtectedDialog.value = false;
            } finally {
              if (requestId === activeProtectionRequest) {
                isProtectionLoading.value = false;
              }
            }
          }

          function onQueryChange() {
            if (window.address === undefined) return;

            const lensParams = new URLSearchParams(window.params);
            const { name: nextPageName, query: nextPageQuery } = parseAddress(
              window.address,
            );
            const didChangePage = pageName.value !== nextPageName;

            pageName.value = nextPageName;
            pageQuery.value = nextPageQuery;

            if (didChangePage) {
              const requestId = ++activeProtectionRequest;
              void refreshPageProtection(nextPageName, requestId);
            }

            const searchDraft = lensParams.get("draft");
            const incomingDraftSeq = Number(lensParams.get("draftSeq"));
            const isLocalDraftEcho =
              !didChangePage &&
              Number.isFinite(incomingDraftSeq) &&
              incomingDraftSeq > 0 &&
              incomingDraftSeq <= localDraftSeq;

            if (searchDraft !== null && !isLocalDraftEcho) {
              draftHtml.value = searchDraft;
            } else if (!draftHtml.value.length) {
              draftHtml.value = template(pageName.value);
            }

            if (publishedHtml.value === null) {
              publishedHtml.value = draftHtml.value;
              resetPublishReminderState();
            }
          }

          window.addEventListener("addresschange", onQueryChange);
          window.addEventListener("paramschange", onQueryChange);
          onQueryChange();

          function download() {
            const blob = new Blob([editorHtml.value], { type: "text/html" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = `${encodeURIComponent(pageName.value)}.html`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
          }

          const editorTheme = ref("vs-dark");
          const darkMode = computed({
            get: () => editorTheme.value === "vs-dark",
            set: (enabled) => {
              editorTheme.value = enabled ? "vs-dark" : "vs";
            },
          });

          const wordWrap = ref(true);
          const minimapEnabled = ref(true);
          const renderWhitespace = ref(false);
          const vimModeEnabled = ref(false);

          watch(editorTheme, (theme) => monaco.editor.setTheme(theme), {
            immediate: true,
          });

          const monacoOptions = computed(() => ({
            lineNumbers: "on",
            automaticLayout: true,
            wordWrap: wordWrap.value ? "on" : "off",
            minimap: { enabled: minimapEnabled.value },
            renderWhitespace: renderWhitespace.value ? "all" : "none",
            smoothScrolling: true,
            scrollBeyondLastLine: true,
            mouseWheelZoom: true,
            quickSuggestions: true,
            suggestOnTriggerCharacters: true,
            tabCompletion: "on",
            parameterHints: { enabled: true },
            lineNumbersMinChars: 3,
          }));

          const codeEditorInstance = shallowRef(null);
          const vimAdapter = shallowRef(null);
          const diffEditorInstance = shallowRef(null);

          const disposeVimMode = () => {
            vimAdapter.value?.dispose();
            vimAdapter.value = null;
          };

          const showDiff = ref(false);

          const syncVimMode = () => {
            disposeVimMode();
            if (!vimModeEnabled.value) return;

            const activeEditor = showDiff.value
              ? diffEditorInstance.value?.getModifiedEditor() ?? null
              : codeEditorInstance.value;

            if (!activeEditor || typeof initVimMode !== "function") return;
            vimAdapter.value = initVimMode(activeEditor, null);
          };

          const onEditorDidMount = (editor) => {
            codeEditorInstance.value = editor;
            syncVimMode();
          };

          watch(showDiff, (enabled) => {
            if (enabled) {
              codeEditorInstance.value = null;
              diffHtml.value = editorHtml.value;
            } else {
              diffEditorInstance.value = null;
            }
          });

          const onDiffChange = (value) => {
            editorHtml.value = value;
          };

          const showPublishDialog = ref(false);
          const publishDialogPageName = ref("");
          const publishDialogSummary = ref("");
          const publishAudienceConfirmed = ref(false);
          const normalizedPublishPageName = computed(() =>
            publishDialogPageName.value.trim(),
          );
          const normalizedPublishSummary = computed(() =>
            publishDialogSummary.value.trim(),
          );
          const publishPageHref = computed(
            () => `#/v?/${encodeURIComponent(normalizedPublishPageName.value)}`,
          );
          const isPublishDialogValid = computed(
            () =>
              normalizedPublishPageName.value.length > 0 &&
              normalizedPublishSummary.value.length > 0 &&
              publishAudienceConfirmed.value,
          );

          watch(publishDialogPageName, (nextPageName, previousPageName) => {
            if (
              nextPageName !== previousPageName &&
              publishAudienceConfirmed.value
            ) {
              publishAudienceConfirmed.value = false;
            }
          });

          const viewMenuDetails = ref(null);
          const onMenuPointerDown = (event) => {
            const target = event.target;
            if (!(target instanceof Node)) return;

            const viewMenu = viewMenuDetails.value;
            if (viewMenu?.open && !viewMenu.contains(target)) {
              viewMenu.open = false;
            }
          };

          const diffOptions = computed(() => ({
            ...monacoOptions.value,
            renderSideBySide: false,
          }));

          const onDiffDidMount = (editor) => {
            diffEditorInstance.value = editor;
            syncVimMode();
          };

          watch([vimModeEnabled, showDiff], syncVimMode);
          watch(
            monacoOptions,
            (opts) => {
              if (!diffEditorInstance.value) return;
              const modified = diffEditorInstance.value.getModifiedEditor();
              const original = diffEditorInstance.value.getOriginalEditor();
              modified.updateOptions(opts);
              original.updateOptions(opts);
            },
            { deep: true },
          );

          const refreshKey = ref(0);
          function refreshPreview() {
            previewHtml.value = editorHtml.value;
            refreshKey.value++;
          }

          const livePreview = ref(true);
          const debouncing = ref(false);
          const bypassBeforeUnload = ref(false);
          const publishing = ref(false);

          let timeout = null;
          let loginBypassListener = null;

          const schedulePreviewUpdate = (newHtml) => {
            debouncing.value = true;
            if (timeout !== null) clearTimeout(timeout);
            timeout = window.setTimeout(() => {
              previewHtml.value = newHtml;
              const draftSeq = ++localDraftSeq;
              window.navigate(
                composeQuery(
                  new URLSearchParams({
                    draft: newHtml,
                    draftSeq: String(draftSeq),
                  }),
                  composeAddress(pageName.value, pageQuery.value),
                )
              );

              debouncing.value = false;
              timeout = null;
            }, DEBOUNCE_DELAY);
          };

          watch(editorHtml, (newHtml) => {
            if (!livePreview.value) return;
            if (newHtml === previewHtml.value) return;
            schedulePreviewUpdate(newHtml);
          });

          watch(livePreview, (enabled, oldVal) => {
            if (enabled && !oldVal) refreshPreview();
          });

          const beforeUnload = (event) => {
            if (bypassBeforeUnload.value || !hasUnsavedChanges.value) return;
            event.preventDefault();
            event.returnValue = "";
          };

          function clearLoginBypassListener() {
            if (!loginBypassListener) return;
            graffiti.sessionEvents.removeEventListener("login", loginBypassListener);
            loginBypassListener = null;
          }

          function setupLoginBypassListener() {
            clearLoginBypassListener();
            loginBypassListener = () => {
              bypassBeforeUnload.value = false;
              clearLoginBypassListener();
            };
            graffiti.sessionEvents.addEventListener("login", loginBypassListener);
          }

          async function ensurePublishSession() {
            if (session.value) return session.value;
            bypassBeforeUnload.value = true;
            setupLoginBypassListener();
            try {
              await graffiti.login();
            } catch (error) {
              clearLoginBypassListener();
              bypassBeforeUnload.value = false;
              throw error;
            }

            if (!session.value) {
              clearLoginBypassListener();
              bypassBeforeUnload.value = false;
            }
            return session.value;
          }

          async function openPublishDialog() {
            if (publishing.value) return;
            if (viewMenuDetails.value?.open) {
              viewMenuDetails.value.open = false;
            }
            try {
              const publishSession = await ensurePublishSession();
              if (!publishSession) return;
            } catch (error) {
              console.error("Error opening publish dialog:", error);
              return;
            }
            showPublishDialog.value = true;
            publishDialogPageName.value = pageName.value;
            publishDialogSummary.value = "";
            publishAudienceConfirmed.value = false;
            void nextTick(() => publishSummaryInput.value?.focus());
          }

          function cancelPublishDialog() {
            if (publishing.value) return;
            showPublishDialog.value = false;
          }

          function selectAllPublishPageName(event) {
            const target = event.currentTarget;
            if (!(target instanceof HTMLInputElement)) return;
            target.select();
            target.setSelectionRange(0, target.value.length);
          }

          async function submitPublishDialog() {
            if (publishing.value || !isPublishDialogValid.value) return;

            const publishName = normalizedPublishPageName.value;
            const summary = normalizedPublishSummary.value;
            publishing.value = true;
            showPublishDialog.value = false;
            try {
              const publishSession = await ensurePublishSession();
              if (!publishSession) return;

              const nextPublishedHtml = editorHtml.value;
              const existingVersions = await getPageVersions(graffiti, publishName);
              await createPageVersion(
                graffiti,
                publishName,
                nextPublishedHtml,
                existingVersions.map((version) => version.url),
                summary,
                publishSession,
              );

              draftHtml.value = nextPublishedHtml;
              publishedHtml.value = nextPublishedHtml;
              resetPublishReminderState();
              window.navigate(
                `#/${composeAddress(
                  "v",
                  composeQuery(
                    undefined,
                    composeAddress(publishName, pageQuery.value),
                  ),
                )}`,
              );
            } catch (error) {
              console.error("Error publishing changes:", error);
              const reason =
                error instanceof Error && error.message.length > 0
                  ? error.message
                  : String(error);
              alert(`Publishing failed: ${reason}`);
            } finally {
              publishing.value = false;
            }
          }

          onMounted(() => {
            window.addEventListener("beforeunload", beforeUnload);
            document.addEventListener("pointerdown", onMenuPointerDown);
            previewTransclude.value?.addEventListener(
              "sw-navigate",
              onPreviewNavigate,
            );
          });

          onBeforeUnmount(() => {
            window.removeEventListener("beforeunload", beforeUnload);
            document.removeEventListener("pointerdown", onMenuPointerDown);
            previewTransclude.value?.removeEventListener(
              "sw-navigate",
              onPreviewNavigate,
            );
            window.removeEventListener("addresschange", onQueryChange);
            window.removeEventListener("paramschange", onQueryChange);
            disposeVimMode();
            clearLoginBypassListener();
            if (timeout !== null) clearTimeout(timeout);
            if (publishShakeTimeout !== null) clearTimeout(publishShakeTimeout);
          });

          return {
            previewTransclude,
            previewTranscludeId,
            pageQuery,
            refreshKey,
            previewHtml,
            shouldShakePublish,
            publishing,
            openPublishDialog,
            download,
            showDiff,
            darkMode,
            wordWrap,
            minimapEnabled,
            renderWhitespace,
            vimModeEnabled,
            debouncing,
            refreshPreview,
            livePreview,
            editorHtml,
            editorTheme,
            monacoOptions,
            onEditorDidMount,
            diffHtml,
            publishedHtml,
            diffOptions,
            onDiffChange,
            onDiffDidMount,
            showPublishDialog,
            cancelPublishDialog,
            submitPublishDialog,
            publishDialogPageName,
            selectAllPublishPageName,
            publishDialogSummary,
            publishAudienceConfirmed,
            publishPageHref,
            normalizedPublishPageName,
            isPublishDialogValid,
            viewMenuDetails,
            showProtectedDialog,
            continueProtectedEdit,
            isProtectionBySessionActor,
            activeProtection,
            activeProtectionTrustSource,
            trustedEditorsRoute,
            historyRoute,
            openProtectedPageHistory,
            cancelProtectedEdit,
            publishSummaryInput,
          };
        }

        createApp({
          template: "#app-template",
          components: {
            TwoPaneLayout,
            CodeEditor,
            DiffEditor,
            GraffitiActorToHandle,
          },
          setup,
        })
          .use(GraffitiPlugin, {
            graffiti: new window.Graffiti(),
          })
          .mount("#app");
      }
    </script>
    <style>
      .pane {
          width: 100%;
          display: flex;
          flex-direction: column;
      }

      .code-editor {
          flex: 1;
          min-height: 0;
      }

      .backdrop {
          position: absolute;
          top: 0;
          left: 0;
          right: 0;
          bottom: 0;
          background: var(--backdrop-color);
          z-index: 100;
          display: flex;
          align-items: center;
          justify-content: center;
      }

      .protected-dialog-overlay,
      .publish-dialog-overlay {
          position: fixed;
          inset: 0;
          z-index: 120;
          display: grid;
          justify-items: center;
          align-items: start;
          overflow: auto;
          padding: 1rem;
          background: var(--backdrop-subtle-color);
      }

      .protected-dialog,
      .publish-dialog {
          position: static;
          inset: auto;
          margin: 0;
          width: min(42rem, calc(100vw - 2rem));
          overflow: visible;
          padding: 1rem;
          border: 1px solid var(--border-color);
          border-radius: 0.5rem;
          background: var(--background-color);
          color: var(--text-color);
          box-shadow: 0 0 2.5rem rgb(0 0 0 / 0.9);
          display: flex;
          flex-direction: column;
          gap: 1rem;
          font-size: 1.5rem;
      }

      .protected-dialog h2,
      .protected-dialog p,
      .publish-dialog h2,
      .publish-dialog p {
          margin: 0;
      }

      .protected-dialog h2,
      .publish-dialog h2 {
          font-size: 2rem;
      }

      .protected-dialog footer,
      .publish-dialog footer {
          display: flex;
          justify-content: space-between;
          gap: 1rem;
      }

      :is(.protected-dialog, .publish-dialog) .allow-button {
          border: 1px solid var(--border-color);
          background: var(--accent-button-background);
          color: var(--accent-button-text);
          border-radius: 0.5rem;
          padding: 0.35rem 0.75rem;
          font-weight: 600;
      }

      :is(.protected-dialog, .publish-dialog) .allow-button:hover {
          border-color: var(--border-color-hover);
          background: var(--accent-button-background-hover);
          color: var(--accent-button-text);
          text-decoration: none;
      }

      :is(.protected-dialog, .publish-dialog) .allow-button:disabled,
      :is(.protected-dialog, .publish-dialog) .allow-button:disabled:hover {
          border-color: var(--border-color);
          background: var(--background-color-interactive);
          color: var(--text-color);
          cursor: not-allowed;
          text-decoration: none;
      }

      .publish-form {
          display: flex;
          flex-direction: column;
          gap: 1.35rem;
      }

      .publish-field {
          display: flex;
          flex-direction: column;
          gap: 0.45rem;
          font-size: 1.15rem;
      }

      .publish-field :is(input, textarea) {
          width: 100%;
          border: 1px solid var(--border-color);
          border-radius: 0.5rem;
          background: var(--background-color);
          color: var(--text-color);
          padding: 0.5rem 0.65rem;
          font: inherit;
      }

      .publish-field :is(input, textarea):focus-visible {
          outline: 2px solid var(--border-color-hover);
          outline-offset: 1px;
      }

      .publish-audience-checkbox {
          display: flex;
          align-items: center;
          gap: 0.65rem;
          line-height: 1.4;
          font-size: 1.3rem;
          cursor: pointer;
      }

      .publish-audience-label {
          display: block;
          flex: 1;
          padding: 0.55rem 0.7rem;
          border: 1px solid var(--border-color);
          border-radius: 0.5rem;
          background: var(--background-color-interactive);
          cursor: pointer;
      }

      .publish-audience-checkbox input {
          width: 2rem;
          height: 2rem;
          flex: 0 0 auto;
          margin-top: 0;
          cursor: pointer;
      }

      .publish-page-name-link {
          color: var(--link-color);
          font-weight: 700;
          text-decoration: underline 2px;
          text-underline-offset: 0.12em;
      }

      .publish-license {
          font-size: 1rem;
          color: var(--secondary-color);
      }

      /* Editor menubar + dropdowns */
      nav > ul[role="menubar"] > li {
          position: relative;
      }

      :is(
          nav summary[role="menuitem"],
          nav > ul > li > button,
          nav > ul > li > :where(label.top-level-checkbox)
      ) {
          list-style: none; /* remove default marker in some browsers */
          cursor: pointer;
          color: var(--link-color);
          background: var(--background-color-interactive);
          border: 1px solid var(--border-color);
          user-select: none;
          padding: 0.25rem 0.5rem;
          border-radius: 0.5rem;
      }

      :is(
          nav summary[role="menuitem"],
          nav > ul > li > button,
          nav > ul > li > :where(label.top-level-checkbox)
      ):hover {
              color: var(--link-color-hover);
              background: var(--background-color-interactive-hover);
              border-color: var(--border-color-hover);
              text-decoration: none;
      }

      nav > ul > li > button.publish-button {
          border-color: var(--border-color);
          background: var(--accent-button-background);
          color: var(--accent-button-text);
      }

      nav > ul > li > button.publish-button:hover {
          border-color: var(--border-color-hover);
          background: var(--accent-button-background-hover);
          color: var(--accent-button-text);
      }

      nav > ul > li > button.publish-button:disabled {
          background: var(--background-color-interactive);
          color: var(--text-color);
      }

      nav > ul > li > button.publish-button:disabled:hover {
          border-color: var(--border-color);
          background: var(--background-color-interactive);
          color: var(--text-color);
      }

      /* dropdown menu */
      nav ul[role="menu"] {
          position: absolute;
          top: calc(100% + 0.25rem);
          left: 0;

          padding: 0.25rem;
          list-style: none;

          background: var(--background-color);
          border: 1px solid var(--border-color);
          border-radius: 0.5rem;
          box-shadow: 0 10px 30px #000000aa;
          z-index: 50;

          width: max-content;
      }

      nav ul[role="menu"] > li > button[role="menuitem"] {
          color: inherit;
          padding: 0.25rem 0.25rem;
          border-radius: 0.5rem;
          cursor: pointer;
      }

      nav ul[role="menu"] > li > button[role="menuitem"]:hover {
          background: var(--background-color-interactive);
          text-decoration: none;
      }

      nav ul[role="menu"] > li > button[role="menuitem"]:focus-visible {
          outline: 2px solid var(--border-color-hover);
      }

      nav ul[role="menu"] > li > label.menu-checkbox {
          display: inline-flex;
          align-items: center;
          gap: 0.4rem;
          padding: 0.25rem 0.4rem;
          border-radius: 0.5rem;
          cursor: pointer;
          user-select: none;
      }

      nav ul[role="menu"] > li > label.menu-checkbox:hover {
          background: var(--background-color-interactive);
      }

      nav .top-level-checkbox {
          display: inline-flex;
          align-items: center;
          gap: 0.4rem;
      }

      nav .refresh-button {
          position: relative;
      }

      nav .refresh-spinner {
          position: absolute;
          top: -0.1rem;
          right: -0.1rem;
          width: 0.7rem;
          height: 0.7rem;
          border: 2px solid currentColor;
          border-right-color: transparent;
          border-radius: 50%;
          animation: refresh-spin 1s linear infinite;
          pointer-events: none;
      }

      /* separators */
      nav ul[role="menu"] > li[role="separator"] {
          height: 1px;
          background: var(--border-color);
          margin: 0.25rem 0.25rem;
      }

      button.publish-button.publish-shake {
          animation: publish-shake 0.3s ease-in-out;
      }

      @keyframes publish-shake {
          0% {
              transform: translateX(0);
          }
          25% {
              transform: translateX(-4px);
          }
          50% {
              transform: translateX(4px);
          }
          75% {
              transform: translateX(-2px);
          }
          100% {
              transform: translateX(0);
          }
      }

      @keyframes refresh-spin {
          to {
              transform: rotate(360deg);
          }
      }
    </style>
  </body>
</html>
