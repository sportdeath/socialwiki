<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Social Wiki History Lens</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <link rel="stylesheet" href="/src/style.css" />
    <link rel="stylesheet" href="/src/lenses/utils/TwoPaneLayout.css" />
    <script src="/init.js"></script>
  </head>
  <body>
    <div id="app">
      <h1 class="status dots">Page loading</h1>
    </div>

    <template id="app-template">
      <two-pane-layout left-title="History" right-title="Preview">
        <template #left-pane>
          <div class="history-pane-content">
            <section v-if="isProtected === undefined" class="protection-panel">
              <h3>Loading...</h3>
            </section>
            <section class="protection-panel" v-else>
              <h3>{{ isProtected ? "Protected Page" : "Unprotected Page" }}</h3>

              <p v-if="isProtected">
                This page has been marked as <strong>protected</strong> by
                <template v-if="isProtectionBySessionActor">
                  <strong>you</strong>.
                </template>
                <template v-else-if="activeProtection">
                  <strong>
                    <graffiti-actor-to-handle
                      :actor="activeProtection.actor"
                    ></graffiti-actor-to-handle>
                  </strong>
                  ,
                  <template v-if="activeProtectionTrustSource === 'default'">
                    a default
                    <a :href="trustedEditorsRoute">trusted editor</a>.
                  </template>
                  <template v-else>
                    an <a :href="trustedEditorsRoute">editor you trust</a>.
                  </template>
                </template>
                <template v-else>a trusted editor.</template>
                Only changes made or endorsed by your
                <a :href="trustedEditorsRoute">trusted editors</a>
                will be shown to you in the
                <a :href="viewAddress">View</a> tab.
              </p>
              <p v-else>
                This page has <strong>not</strong> been marked as protected by
                you or an
                <a :href="trustedEditorsRoute">editor you trust</a>.
                Anyone's changes to this page will be visible to you.
              </p>

              <p v-if="$graffitiSession.value">
                <button
                  type="button"
                  :disabled="hasPendingMutation || isProtected === undefined"
                  :class="{ warning: isProtected }"
                  @click="handleUpdatePageProtection($graffitiSession.value)"
                >
                  {{ protectionActionLabel }}
                </button>
              </p>
              <p v-else>
                <button @click="$graffiti.login()">Log in to manage protection</button>
              </p>

              <details
                class="protection-history"
                v-if="protectionHistory && protectionHistory.length"
              >
                <summary>Protection history</summary>
                <ol class="protection-history-list">
                  <li v-for="annotation in protectionHistory" :key="annotation.url">
                    <p>
                      {{
                        annotation.value.activity === "Protect"
                          ? "Protected"
                          : "Protection removed"
                      }}
                      by
                      <strong>
                        <graffiti-actor-to-handle
                          :actor="annotation.actor"
                        ></graffiti-actor-to-handle>
                      </strong>
                      <span
                        v-if="isActorInDefaultTrustedList(annotation.actor)"
                        class="history-default-indicator"
                      >
                        (Default trusted editor)
                      </span>
                    </p>
                    <time
                      :datetime="new Date(annotation.value.published).toISOString()"
                    >
                      {{ new Date(annotation.value.published).toLocaleString() }}
                    </time>
                    <p
                      v-if="$graffitiSession.value?.actor === annotation.actor"
                    >
                      <button
                        type="button"
                        class="warning"
                        :disabled="hasPendingMutation"
                        @click="undoProtectionHistory(annotation, $graffitiSession.value)"
                      >
                        {{ isUndoingProtection(annotation) ? "Undoing..." : "Undo" }}
                      </button>
                    </p>
                  </li>
                </ol>
              </details>
            </section>

            <ol class="history-list">
              <li v-for="(version, index) in pageVersions" :key="version.url">
                <article
                  :id="version.url"
                  :class="{
                    selected: isSelected(version),
                    untrusted: isVersionUntrusted(version) && !isSelected(version),
                  }"
                  role="button"
                  tabindex="0"
                  @click="selectPageVersion(version)"
                  @keydown.enter.self.prevent="selectPageVersion(version)"
                  @keydown.space.self.prevent="selectPageVersion(version)"
                >
                  <header>
                    <h3>{{ formatSummary(version.value.summary) }}</h3>
                  </header>

                  <div class="history-meta">
                    <p class="history-actor-row">
                      <strong class="history-actor">
                        <graffiti-actor-to-handle
                          :actor="version.actor"
                        ></graffiti-actor-to-handle>
                      </strong>
                      <span
                        v-if="isVersionUntrusted(version) && !isSelected(version)"
                        class="history-untrusted-indicator"
                      >
                        (Untrusted editor)
                      </span>
                      <span class="history-trust-inline" v-if="isSelected(version)">
                        <template v-if="$graffitiSession.value?.actor === version.actor">
                          <span>(You.)</span>
                        </template>
                        <template
                          v-else-if="getActorTrustStatus(version.actor) === 'trusted'"
                        >
                          <span>
                            ({{
                              isActorInDefaultTrustedList(version.actor)
                                ? "Default trusted editor."
                                : "Trusted editor."
                            }}
                          </span>
                          <button
                            class="secondary"
                            type="button"
                            v-if="$graffitiSession.value && !isUpdatingTrust(version.actor)"
                            @click.stop.prevent="toggleActorTrust(version.actor, $graffitiSession.value)"
                          >
                            Untrust?
                          </button>
                          <button
                            class="secondary"
                            disabled
                            type="button"
                            v-else-if="isUpdatingTrust(version.actor)"
                          >
                            Updating...
                          </button>
                          <span>)</span>
                        </template>
                        <template
                          v-else-if="getActorTrustStatus(version.actor) === 'untrusted'"
                        >
                          <span>(Untrusted editor.</span>
                          <button
                            type="button"
                            v-if="$graffitiSession.value && !isUpdatingTrust(version.actor)"
                            @click.stop.prevent="toggleActorTrust(version.actor, $graffitiSession.value)"
                          >
                            Trust?
                          </button>
                          <button
                            class="secondary"
                            disabled
                            type="button"
                            v-else-if="isUpdatingTrust(version.actor)"
                          >
                            Updating...
                          </button>
                          <span>)</span>
                        </template>
                        <span v-else>(Loading...)</span>
                      </span>
                    </p>
                    <time :datetime="new Date(version.value.published).toISOString()">
                      {{ new Date(version.value.published).toLocaleString() }}
                    </time>
                  </div>

                  <footer v-if="isSelected(version)">
                    <ul>
                      <li v-if="$graffitiSession.value && index !== 0">
                        <button
                          :disabled="hasPendingMutation"
                          @click.stop="restorePageVersion(version, $graffitiSession.value)"
                        >
                          {{ isRestoringVersion(version) ? "Restoring..." : "Restore" }}
                        </button>
                      </li>
                      <li
                        v-if="
                          $graffitiSession.value &&
                          index === 0 &&
                          $graffitiSession.value.actor !== version.actor
                        "
                      >
                        <button
                          :disabled="hasPendingMutation"
                          @click.stop="endorsePageVersion(version, $graffitiSession.value)"
                        >
                          {{ isEndorsingVersion(version) ? "Endorsing..." : "Endorse" }}
                        </button>
                      </li>
                      <li>
                        <a :href="editAddress">Edit</a>
                      </li>
                      <li>
                        <a :href="previewAddress">Link</a>
                      </li>
                      <li v-if="$graffitiSession.value?.actor === version.actor">
                        <button
                          class="warning"
                          :disabled="hasPendingMutation"
                          @click.stop="deleteSelectedPageVersion(version, $graffitiSession.value)"
                        >
                          {{ isDeletingVersion(version) ? "Deleting..." : "Delete" }}
                        </button>
                      </li>
                    </ul>
                  </footer>
                </article>
              </li>
            </ol>
          </div>
        </template>
        <template #right-pane>
          <sw-transclude
            id="preview"
            name="Preview"
            ref="transclude"
            :src="previewAddress"
          ></sw-transclude>
        </template>
      </two-pane-layout>
    </template>

    <script type="module">
      import { createApp, computed, onBeforeUnmount, onMounted, ref, watch } from "vue";
      import {
        GraffitiPlugin,
        useGraffiti,
        GraffitiActorToHandle,
        useGraffitiDiscover,
        useGraffitiSession,
      } from "@graffiti-garden/wrapper-vue";
      import TwoPaneLayout from "/src/lenses/utils/TwoPaneLayout.js";
      import {
        createPageVersion,
        deletePageVersion,
        pageVersionSchema,
        sortPageVersions,
      } from "/src/lenses/utils/page-versions.js";
      import {
        composeAddress,
        composeQuery,
        parseAddress,
        parseQuery,
      } from "/src/backend/route.js";
      import { annotationSchema } from "/src/lenses/utils/schemas.js";
      import { computeTrustAnnotationsByActor, trustActor } from "/src/lenses/utils/trust.js";
      import { defaultTrustedEditors } from "/src/lenses/utils/default-trusted-editors.js";
      import {
        sortProtectionHistory,
        updatePageProtection,
      } from "/src/lenses/utils/protection.js";

      if (window.top !== window) {
        function setup() {
          function emitLensOutput(status, srcdoc) {
            window.emit("sw-lens-output", { status, srcdoc });
          }

          const pageName = ref("");
          const pageQuery = ref("");
          const selectedPageVersion = ref(undefined);

          function onQueryChange() {
            const { name: nextPageName, query: nextPageQuery } = parseAddress(
              window.address,
            );
            const didChangePage = pageName.value !== nextPageName;

            pageName.value = nextPageName;
            pageQuery.value = nextPageQuery;

            if (didChangePage) {
              // Avoid rendering stale preview routes while the new page versions load.
              selectedPageVersion.value = undefined;
            }
          }
          window.addEventListener("addresschange", onQueryChange);
          onQueryChange();

          const transclude = ref(null);
          let previewObserver;
          const previewHtml = ref("");

          const outputPreviewIfReady = () => {
            const preview = transclude.value;
            if (!(preview instanceof HTMLElement)) return;

            const status = preview.getAttribute("status");
            const html = preview.getAttribute("srcdoc");
            previewHtml.value = html ?? "";
            if (status === "ok" && html !== null) {
              emitLensOutput("ok", html);
            }
          };

          function onPreviewNavigate(e) {
            if (!(e instanceof CustomEvent) || typeof e.detail?.to !== "string") return;
            const to = e.detail.to;

            // If not relative, just pass it on
            if (!to.startsWith("?")) return window.navigate(to);

            // For relative queries strip out the version name
            const { address } = parseQuery(to);
            window.navigate(composeQuery(undefined, address));
          }

          onMounted(() => {
            if (!(transclude.value instanceof HTMLElement)) return;
            previewObserver = new MutationObserver(outputPreviewIfReady);
            transclude.value.addEventListener("sw-navigate", onPreviewNavigate);
            previewObserver.observe(transclude.value, {
              attributes: true,
              attributeFilter: ["srcdoc"],
            });
            outputPreviewIfReady();
          });

          onBeforeUnmount(() => {
            previewObserver?.disconnect();
            if (transclude.value instanceof HTMLElement) {
              transclude.value.removeEventListener("sw-navigate", onPreviewNavigate);
            }
          });

          const { objects: pageVersionsAndAnnotations, isFirstPoll } =
            useGraffitiDiscover(
              () => [pageName.value],
              () => ({
                anyOf: [
                  pageVersionSchema(pageName.value),
                  annotationSchema(["Protect", "Remove"]),
                ],
              }),
            );

          const pageVersions = computed(() => {
            const pageVersionsRaw = pageVersionsAndAnnotations.value.filter(
              (o) => o.value.activity === "Update",
            );
            return sortPageVersions(pageVersionsRaw);
          });

          const session = useGraffitiSession();
          const { objects: trustAnnotations, isFirstPoll: isTrustAnnotationLoading } =
            useGraffitiDiscover(
              () => (session.value ? [session.value.actor] : []),
              annotationSchema(["Trust", "Untrust"], { actor: session.value?.actor }),
            );

          const trustAnnotationsByActor = computed(() => {
            if (isTrustAnnotationLoading.value) return undefined;
            return computeTrustAnnotationsByActor(
              trustAnnotations.value,
              defaultTrustedEditors,
            );
          });

          const defaultTrustedEditorSet = new Set(defaultTrustedEditors);
          const trustedEditors = computed(() => {
            if (trustAnnotationsByActor.value === undefined) return undefined;
            const trusted = new Set(
              [...trustAnnotationsByActor.value.entries()]
                .filter(([_, o]) => o === true || o?.value.activity === "Trust")
                .map(([actor]) => actor),
            );

            if (session.value?.actor) {
              trusted.add(session.value.actor);
            }

            return [...trusted];
          });

          const protectionHistory = computed(() => {
            if (trustedEditors.value === undefined) return undefined;
            const annotationsRaw = pageVersionsAndAnnotations.value.filter(
              (o) => o.value.activity === "Protect" || o.value.activity === "Remove",
            );
            return sortProtectionHistory(annotationsRaw, trustedEditors.value);
          });

          const isProtected = computed(() => {
            if (protectionHistory.value === undefined) return undefined;
            return protectionHistory.value.at(0)?.value.activity === "Protect";
          });

          const activeProtection = computed(() => {
            const latest = protectionHistory.value?.at(0);
            if (!latest || latest.value.activity !== "Protect") return null;
            return latest;
          });

          const trustedEditorsRoute = "#/v?/trusted-editors";

          const graffiti = useGraffiti();
          const restoringVersionUrl = ref(null);
          const endorsingVersionUrl = ref(null);
          const deletingVersionUrl = ref(null);
          const isUpdatingProtection = ref(false);
          const undoingProtectionUrl = ref(null);

          const hasPendingMutation = computed(
            () =>
              restoringVersionUrl.value !== null ||
              endorsingVersionUrl.value !== null ||
              deletingVersionUrl.value !== null ||
              isUpdatingProtection.value ||
              undoingProtectionUrl.value !== null,
          );

          const protectionActionLabel = computed(() => {
            if (isUpdatingProtection.value) {
              return isProtected.value
                ? "Removing protection..."
                : "Protecting page...";
            }
            if (isProtected.value === undefined) return "Loading...";
            return isProtected.value ? "Remove protection" : "Protect this page";
          });

          async function handleUpdatePageProtection(sessionValue) {
            if (hasPendingMutation.value || isProtected.value === undefined) return;
            isUpdatingProtection.value = true;
            try {
              await updatePageProtection(
                graffiti,
                pageName.value,
                isProtected.value,
                activeProtection.value,
                sessionValue,
              );
            } catch (error) {
              console.error(`Error updating page protection: ${String(error)}`);
            } finally {
              isUpdatingProtection.value = false;
            }
          }

          const isUndoingProtection = (annotation) =>
            undoingProtectionUrl.value === annotation.url;

          async function undoProtectionHistory(annotation, sessionValue) {
            if (hasPendingMutation.value) return;
            undoingProtectionUrl.value = annotation.url;
            try {
              await graffiti.delete(annotation, sessionValue);
            } finally {
              if (undoingProtectionUrl.value === annotation.url) {
                undoingProtectionUrl.value = null;
              }
            }
          }

          async function restorePageVersion(version, sessionValue) {
            if (hasPendingMutation.value) return;
            const html = transclude.value?.getAttribute("srcdoc");
            if (!html) {
              console.error("no HTML to restore");
              return;
            }
            restoringVersionUrl.value = version.url;
            try {
              selectedPageVersion.value = await createPageVersion(
                graffiti,
                version.value.object,
                html,
                pageVersions.value.map((v) => v.url),
                `Restore: ${version.value.summary}`,
                sessionValue,
              );
            } finally {
              if (restoringVersionUrl.value === version.url) {
                restoringVersionUrl.value = null;
              }
            }
          }

          async function endorsePageVersion(version, sessionValue) {
            if (hasPendingMutation.value) return;
            const html = transclude.value?.getAttribute("srcdoc");
            if (!html) {
              console.error("no HTML to endorse");
              return;
            }
            endorsingVersionUrl.value = version.url;
            try {
              selectedPageVersion.value = await createPageVersion(
                graffiti,
                version.value.object,
                html,
                pageVersions.value.map((v) => v.url),
                `Endorse: ${version.value.summary}`,
                sessionValue,
              );
            } finally {
              if (endorsingVersionUrl.value === version.url) {
                endorsingVersionUrl.value = null;
              }
            }
          }

          async function deleteSelectedPageVersion(version, sessionValue) {
            if (hasPendingMutation.value) return;
            deletingVersionUrl.value = version.url;
            try {
              await deletePageVersion(graffiti, version, sessionValue);
            } finally {
              if (deletingVersionUrl.value === version.url) {
                deletingVersionUrl.value = null;
              }
            }
          }

          const effectiveSelectedPageVersion = computed(() => {
            if (isProtected.value === undefined) return null;

            const selected = selectedPageVersion.value;
            if (
              selected &&
              pageVersions.value.some((version) => version.url === selected.url)
            ) {
              return selected;
            }

            if (isProtected.value) {
              return (
                pageVersions.value.find((version) =>
                  trustedEditors.value?.includes(version.actor),
                ) || null
              );
            }

            return pageVersions.value.at(0) || null;
          });

          const previewAddress = computed(() => {
            const lensParams = new URLSearchParams();
            if (effectiveSelectedPageVersion.value) {
              lensParams.set(
                "version",
                effectiveSelectedPageVersion.value.value.result.media,
              );
            }

            return `#/${composeAddress(
              "v",
              composeQuery(
                lensParams,
                composeAddress(pageName.value, pageQuery.value),
              ),
            )}`;
          });

          const viewAddress = computed(
            () =>
              `#/${composeAddress(
                "v",
                composeQuery(
                  undefined,
                  composeAddress(pageName.value, pageQuery.value),
                ),
              )}`,
          );

          const editAddress = computed(
            () =>
              `#/${composeAddress(
                "e",
                composeQuery(
                  new URLSearchParams({
                    draft: previewHtml.value,
                  }),
                  composeAddress(pageName.value, pageQuery.value),
                ),
              )}`,
          );

          const selectPageVersion = (version) => {
            if (isProtected.value === undefined) return;
            selectedPageVersion.value = version;
          };

          const isSelected = (version) =>
            effectiveSelectedPageVersion.value?.url === version.url;
          const isRestoringVersion = (version) =>
            restoringVersionUrl.value === version.url;
          const isEndorsingVersion = (version) =>
            endorsingVersionUrl.value === version.url;
          const isDeletingVersion = (version) =>
            deletingVersionUrl.value === version.url;
          const isVersionUntrusted = (version) =>
            isProtected.value === true &&
            trustedEditors.value !== undefined &&
            !trustedEditors.value.includes(version.actor);

          const formatSummary = (summary) =>
            summary?.trim() || "No summary provided";

          watch(pageVersions, (versions) => {
            if (!versions.length) {
              selectedPageVersion.value = undefined;
              return;
            }

            const selectedUrl = selectedPageVersion.value?.url;
            if (
              selectedUrl &&
              !versions.some((version) => version.url === selectedUrl)
            ) {
              selectedPageVersion.value = undefined;
            }
          });

          watch([pageVersions, isFirstPoll], ([versions, firstPoll]) => {
            if (firstPoll) return;
            if (!versions.length) {
              emitLensOutput("not-found");
            }
          });

          const getActorTrustStatus = (actor) => {
            if (session.value?.actor === actor) return "self";
            const byActor = trustAnnotationsByActor.value;
            if (!byActor) return "loading";
            const trustValue = byActor.get(actor);
            return trustValue === true || trustValue?.value.activity === "Trust"
              ? "trusted"
              : "untrusted";
          };

          const isActorInDefaultTrustedList = (actor) =>
            defaultTrustedEditorSet.has(actor);

          const isProtectionBySessionActor = computed(
            () => activeProtection.value?.actor === session.value?.actor,
          );

          const activeProtectionTrustSource = computed(() => {
            const actor = activeProtection.value?.actor;
            if (!actor || isProtectionBySessionActor.value) return null;
            return trustAnnotationsByActor.value?.get(actor) === true
              ? "default"
              : "trusted";
          });

          const trustMutationActor = ref(null);
          const isUpdatingTrust = (actor) => trustMutationActor.value === actor;

          async function toggleActorTrust(actor, sessionValue) {
            if (actor === sessionValue.actor) return;
            trustMutationActor.value = actor;
            try {
              const trustValue = trustAnnotationsByActor.value?.get(actor);

              if (typeof trustValue === "object") {
                await graffiti.delete(trustValue, sessionValue);
              } else {
                await trustActor(graffiti, actor, sessionValue, {
                  untrust: trustValue === true,
                });
              }
            } catch (error) {
              alert(`Error updating editor trust: ${String(error)}`);
            } finally {
              if (trustMutationActor.value === actor) {
                trustMutationActor.value = null;
              }
            }
          }

          return {
            activeProtection,
            activeProtectionTrustSource,
            deleteSelectedPageVersion,
            editAddress,
            formatSummary,
            getActorTrustStatus,
            handleUpdatePageProtection,
            hasPendingMutation,
            isActorInDefaultTrustedList,
            isDeletingVersion,
            isEndorsingVersion,
            isProtected,
            isProtectionBySessionActor,
            isRestoringVersion,
            isSelected,
            isUndoingProtection,
            isUpdatingTrust,
            isVersionUntrusted,
            pageVersions,
            previewAddress,
            protectionActionLabel,
            protectionHistory,
            restorePageVersion,
            endorsePageVersion,
            selectPageVersion,
            toggleActorTrust,
            transclude,
            trustedEditorsRoute,
            undoProtectionHistory,
            viewAddress,
          };
        }

        createApp({
          template: "#app-template",
          components: {
            TwoPaneLayout,
            GraffitiActorToHandle,
          },
          setup,
        })
          .use(GraffitiPlugin, { graffiti: new window.Graffiti() })
          .mount("#app");
      }
    </script>

    <style>
      .history-pane-content {
        width: 100%;
        display: flex;
        flex-direction: column;
        min-width: 0;
      }

      .protection-panel {
        width: 100%;
        display: grid;
        gap: 0.5rem;
        padding: 0.75rem;
        border-bottom: 1px solid var(--border-color);
      }

      .protection-panel h3 {
        margin: 0;
        font-size: 1rem;
      }

      .protection-help {
        color: var(--secondary-color);
        font-size: 0.9rem;
      }

      .protection-history > summary {
        cursor: pointer;
      }

      .protection-history-list {
        list-style: none;
        margin: 0.5rem 0 0;
        padding: 0;
        display: grid;
        gap: 0.5rem;
      }

      .protection-history-list > li {
        border: 1px solid var(--border-color);
        border-radius: 0.5rem;
        padding: 0.5rem;
        display: grid;
        gap: 0.15rem;
      }

      .protection-history-list > li time {
        color: var(--secondary-color);
        font-size: 0.85rem;
      }

      .history-list {
        flex: 1;
        width: 100%;
        list-style: none;
        padding: 0.75rem;
        margin: 0;
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }

      .history-list > li > article {
        border: 1px solid var(--border-color);
        border-radius: 0.5rem;
        padding: 0.75rem;
        display: grid;
        gap: 0.45rem;
        cursor: pointer;
        transition:
          background-color 0.15s ease,
          border-color 0.15s ease;
      }

      .history-list > li > article:hover {
        background: var(--background-color-interactive);
        border-color: var(--border-color-hover);
      }

      .history-list > li > article.selected {
        background: var(--background-color-interactive);
        border-color: var(--border-color-hover);
        box-shadow: 0 0 0 1px var(--border-color-hover);
      }

      .history-list > li > article.untrusted {
        border-style: dashed;
      }

      .history-list > li > article.untrusted h3 {
        color: var(--secondary-color);
      }

      .history-list > li > article:focus-visible {
        outline: 2px solid var(--border-color-hover);
        outline-offset: 1px;
      }

      .history-list h3 {
        margin: 0;
        font-size: 1.1rem;
        line-height: 1.35;
        color: var(--link-color);
        overflow-wrap: anywhere;
        word-break: break-word;
      }
